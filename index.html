<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Map</title>
  <link rel="icon"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=file_map_stack" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
    }

    #upload-container {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .custom-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
    }

    .settings-sidebar {
      position: absolute;
      top: 0;
      right: -300px;
      width: 280px;
      height: 100%;
      background: white;
      z-index: 2000;
      box-shadow: -2px 0 5px rgba(0, 0, 0, 0.3);
      transition: right 0.3s;
      padding: 20px;
      box-sizing: border-box;
    }

    .settings-sidebar.open {
      right: 0;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
      margin-bottom: 15px;
    }

    .range-group {
      margin-bottom: 15px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 5px;
    }

    label {
      font-size: 12px;
      font-weight: bold;
    }

    select,
    input[type="range"] {
      width: 100%;
      margin-top: 5px;
    }

    .color-settings {
      margin-top: 0;
      margin-bottom: 0;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="upload-container">
    <label for="input-json" class="custom-button">
      <span class="material-symbols-outlined">add</span>
      <input type="file" id="input-json" accept=".json" style="display: none;">
    </label>
    <div id="show-settings" class="custom-button">
      <span class="material-symbols-outlined">settings</span>
    </div>
  </div>
  <div id="settings-panel" class="settings-sidebar">
    <div class="settings-header">
      <h3>Ustawienia</h3>
      <span id="close-settings" class="material-symbols-outlined" style="cursor: pointer;">close</span>
    </div>
    <h3 class="color-settings">Ustawienia Kolorów</h3>
    <div class="settings-content">
      <div class="range-group">
        <label><b>Kolor 1: </b>0 do <span id="val-1">30</span></label>
        <select id="color-1">
          <option value="green" selected>Zielony</option>
          <option value="blue">Niebieski</option>
          <option value="teal">Morski</option>
        </select>
        <input type="range" id="thresh-1" min="0" max="100" step="0.1" value="17.5">
      </div>
      <div class="range-group">
        <label><b>Kolor 2: </b><span id="val-1-mirror">30</span> do <span id="val-2">200</span></label>
        <select id="color-2">
          <option value="yellow" selected>Żółty</option>
          <option value="orange">Pomarańczowy</option>
          <option value="purple">Fioletowy</option>
        </select>
        <input type="range" id="thresh-2" min="0" max="100" step="0.1" value="45">
      </div>
      <div class="range-group">
        <label><b>Kolor 3: </b>Powyżej <span id="val-2-mirror">200</span></label>
        <select id="color-3">
          <option value="red" selected>Czerwony</option>
          <option value="black">Czarny</option>
        </select>
      </div>
      <div class="range-group">
        <label><input type="checkbox" id="filter-old"> Pokaż tylko powyżej progu 2</label>
      </div>


      <button id="apply-settings"
        style="width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer;font-size: small;">
        Zastosuj i przerysuj
      </button>
    </div>
    <hr>
    <a href="https://jsonformatter.org/xml-to-json" target="_blank"
      style="display: block; width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; text-align: center; text-decoration: none; box-sizing: border-box; font-family: Arial, sans-serif; margin-top: 10px; font-size: small;">
      Konwersja XML to JSON
    </a>
  </div>

  <script>
    // API
    const key = 'wD54InrFLnCBbJzeUzKr';

    const map = L.map('map').setView([52.31, 19.55], 7);
    const layerGroup = L.layerGroup().addTo(map);
    let ostatnieDane = [];

    L.tileLayer(`https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key=${key}`, {
      tileSize: 512, zoomOffset: -1, minZoom: 1, crossOrigin: true,
      attribution: '&copy; MapTiler &copy; OpenStreetMap'
    }).addTo(map);

    function dodawanie(nazwa, lat, lon, color) {
      return L.circleMarker([lat, lon], {
        radius: 10, color: color, fillColor: color, fillOpacity: 0.6
      }).bindPopup(nazwa);
    }

    const t1 = document.getElementById('thresh-1');
    const t2 = document.getElementById('thresh-2');

    t1.addEventListener('input', () => {
      const dni = skalarNaDni(t1.value);
      const tekst = formatujDni(dni);
      document.getElementById('val-1').textContent = tekst;
      document.getElementById('val-1-mirror').textContent = tekst;
    });

    t2.addEventListener('input', () => {
      const dni = skalarNaDni(t2.value);
      const tekst = formatujDni(dni);
      document.getElementById('val-2').textContent = tekst;
      document.getElementById('val-2-mirror').textContent = tekst;
    });

    // Otwieranie/Zamykanie
    document.getElementById('show-settings').onclick = () => document.getElementById('settings-panel').classList.add('open');
    document.getElementById('close-settings').onclick = () => document.getElementById('settings-panel').classList.remove('open');

    // --- LOGIKA MAPY ---
    function przetworzIRysuj(listaOsob) {
      ostatnieDane = listaOsob;
      layerGroup.clearLayers();

      // Pobranie aktualnych wartości z suwaków i selectów
      const prog1 = skalarNaDni(t1.value);
      const prog2 = skalarNaDni(t2.value);
      const c1 = document.getElementById('color-1').value;
      const c2 = document.getElementById('color-2').value;
      const c3 = document.getElementById('color-3').value;
      const filterOld = document.getElementById('filter-old').checked;

      listaOsob.forEach(osoba => {
        let dni = osoba.dni_od_ostatniej_wizyty;
        if (filterOld && dni <= prog2) {
          return;
        }

        let kolor;

        // Logika przedziałów
        if (dni <= prog1) {
          kolor = c1;
        } else if (dni <= prog2) {
          kolor = c2;
        } else {
          kolor = c3;
        }
        //Opis
        const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${osoba.lat},${osoba.lon}`;
        const opis = `
            <b>${osoba.imie} ${osoba.nazwisko}</b><br>
            Wizyta: ${dni} dni temu<br>
            <a href="${googleMapsUrl}" target="_blank" style="display:inline-block; margin-top:5px; padding:5px 10px; background:#4285F4; color:white; text-decoration:none; border-radius:3px;">Mapy</a>
        `;
        const m = dodawanie(opis, osoba.lat, osoba.lon, kolor);
        layerGroup.addLayer(m);
      });

      if (layerGroup.getLayers().length > 0) {
        map.fitBounds(L.featureGroup(layerGroup.getLayers()).getBounds());
      }
    }

    // Wczytywanie pliku
    document.getElementById('input-json').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const dane = JSON.parse(event.target.result);
          przetworzIRysuj(dane);
        } catch (err) {
          alert("Błąd pliku JSON!");
        }
      };
      reader.readAsText(file);
    };

    function skalarNaDni(val) {
      return Math.round(Math.pow(val, 2) / 3.42);
    }

    // Przycisk Zastosuj
    document.getElementById('apply-settings').onclick = () => {
      if (ostatnieDane.length > 0) {
        przetworzIRysuj(ostatnieDane);
        document.getElementById('settings-panel').classList.remove('open');
      } else {
        alert("Najpierw wczytaj dane!");
      }
    };

    function formatujDni(dni) {
      if (dni < 365) {
        return `${dni} dni`;
      } else {
        const lata = (dni / 365).toFixed(1);
        return `${dni} dni (~${lata} lat)`;
      }
    }
  </script>
</body>

</html>
