<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Map</title>
  <link rel="icon"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=file_map_stack" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
    }

    #upload-container {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .custom-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
    }

    .settings-sidebar {
      position: absolute;
      top: 0;
      right: -300px;
      width: 280px;
      height: 100%;
      background: white;
      z-index: 2000;
      box-shadow: -2px 0 5px rgba(0, 0, 0, 0.3);
      transition: right 0.3s;
      padding: 20px;
      box-sizing: border-box;
    }

    .settings-sidebar.open {
      right: 0;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
      margin-bottom: 15px;
    }

    .range-group {
      margin-bottom: 15px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 5px;
    }

    label {
      font-size: 12px;
      font-weight: bold;
    }

    select,
    input[type="range"] {
      width: 100%;
      margin-top: 5px;
    }

    .color-settings {
      margin-top: 0;
      margin-bottom: 0;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="upload-container">
    <label for="input-json" class="custom-button">
      <span class="material-symbols-outlined">add</span>
      <input type="file" id="input-json" accept=".json" style="display: none;">
    </label>
    <div id="show-settings" class="custom-button">
      <span class="material-symbols-outlined">settings</span>
    </div>
  </div>
  <div id="settings-panel" class="settings-sidebar">
    <div class="settings-header">
      <h3>Ustawienia</h3>
      <span id="close-settings" class="material-symbols-outlined" style="cursor: pointer;">close</span>
    </div>
    <h3 class="color-settings">Ustawienia Kolorów</h3>
    <div class="settings-content">
      <div class="range-group">
        <label><input type="checkbox" id="show-c1" checked> <b>Kolor 1: </b>0 do <span id="val-1">300</span></label>
        <select id="color-1">
          <option value="green" selected>Zielony</option>
          <option value="yellow">Żółty</option>
          <option value="red">Czerwony</option>
          <option value="orange">Pomarańczowy</option>
          <option value="purple">Fioletowy</option>
          <option value="black">Czarny</option>
        </select>
        <input type="range" id="thresh-1" min="0" max="100" step="0.1" value="32">
      </div>
      <div class="range-group">
        <label><input type="checkbox" id="show-c2" checked> <b>Kolor 2: </b><span id="val-1-mirror">300</span> do <span
            id="val-2">450</span></label>
        <select id="color-2">
          <option value="green">Zielony</option>
          <option value="yellow" selected>Żółty</option>
          <option value="red">Czerwony</option>
          <option value="orange">Pomarańczowy</option>
          <option value="purple">Fioletowy</option>
          <option value="black">Czarny</option>
        </select>
        <input type="range" id="thresh-2" min="0" max="100" step="0.1" value="40">
      </div>
      <div class="range-group">
        <label><input type="checkbox" id="show-c3" checked> <b>Kolor 3: </b>Powyżej <span
            id="val-2-mirror">200</span></label>
        <select id="color-3">
          <option value="green">Zielony</option>
          <option value="yellow">Żółty</option>
          <option value="red" selected>Czerwony</option>
          <option value="orange">Pomarańczowy</option>
          <option value="purple">Fioletowy</option>
          <option value="black">Czarny</option>
        </select>
      </div>
    </div>
    <hr>
    <h3 class="color-settings">Filtr producenta</h3>
    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
      <button id="check-all-prods" style="flex: 1; font-size: 10px; cursor: pointer; padding: 5px;">Zaznacz
        wszystko</button>
      <button id="uncheck-all-prods" style="flex: 1; font-size: 10px; cursor: pointer; padding: 5px;">Odznacz
        wszystko</button>
    </div>
    <div id="producer-filter-container"
      style="max-height: 200px; overflow-y: auto; padding: 10px; background: #f9f9f9; border-radius: 5px; font-size: 12px;">
      <p style="color: #888;">Wczytaj dane, aby zobaczyć listę...</p>
    </div>
    <hr>
    <button id="apply-settings"
      style="width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer;font-size: small;">
      Zastosuj i przerysuj
    </button>
    <hr>
    <a href="https://jsonformatter.org/xml-to-json" target="_blank"
      style="display: block; width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; text-align: center; text-decoration: none; box-sizing: border-box; font-family: Arial, sans-serif; margin-top: 10px; font-size: small;">
      Konwersja XML to JSON
    </a>
  </div>

  <script>
    // API
    const key = 'wD54InrFLnCBbJzeUzKr';
    let wybraniProducenci = new Set();
    const map = L.map('map').setView([52.31, 19.55], 7);
    const layerGroup = L.layerGroup().addTo(map);
    let ostatnieDane = [];

    L.tileLayer(`https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key=${key}`, {
      tileSize: 512, zoomOffset: -1, minZoom: 1, crossOrigin: true,
      attribution: '&copy; MapTiler &copy; OpenStreetMap'
    }).addTo(map);

    function dodawanie(nazwa, lat, lon, color) {
      return L.circleMarker([lat, lon], {
        radius: 10, color: color, fillColor: color, fillOpacity: 0.6
      }).bindPopup(nazwa);
    }

    const t1 = document.getElementById('thresh-1');
    const t2 = document.getElementById('thresh-2');

    t1.addEventListener('input', () => {
      const dni = skalarNaDni(t1.value);
      const tekst = formatujDni(dni);
      document.getElementById('val-1').textContent = tekst;
      document.getElementById('val-1-mirror').textContent = tekst;
    });

    t2.addEventListener('input', () => {
      const dni = skalarNaDni(t2.value);
      const tekst = formatujDni(dni);
      document.getElementById('val-2').textContent = tekst;
      document.getElementById('val-2-mirror').textContent = tekst;
    });

    // Otwieranie/Zamykanie
    document.getElementById('show-settings').onclick = () => document.getElementById('settings-panel').classList.add('open');
    document.getElementById('close-settings').onclick = () => document.getElementById('settings-panel').classList.remove('open');

    // --- LOGIKA MAPY ---
    // --- LOGIKA MAPY ---
    function przetworzIRysuj(listaOsob) {
      if (!listaOsob) return;
      ostatnieDane = listaOsob;
      layerGroup.clearLayers();

      const prog1 = skalarNaDni(t1.value);
      const prog2 = skalarNaDni(t2.value);
      const kolory = {
        c1: document.getElementById('color-1').value,
        c2: document.getElementById('color-2').value,
        c3: document.getElementById('color-3').value
      };

      const widocznosc = {
        showC1: document.getElementById('show-c1').checked,
        showC2: document.getElementById('show-c2').checked,
        showC3: document.getElementById('show-c3').checked
      };

      const wagaKoloru = {
        [document.getElementById('color-1').value]: 1, // Zielony (najmniej ważny)
        [document.getElementById('color-2').value]: 2, // Żółty
        [document.getElementById('color-3').value]: 3, // Czerwony (itd.)
        "orange": 4,
        "purple": 5,
        "black": 6 // Czarny (najważniejszy)
      };

      const fData = (d) => d ? d.split('T')[0] : "Brak danych";
      const capitalize = (str) => {
        if (!str) return "";
        return str.toString().split(' ').map((word, index) => {
          if (word.toLowerCase() === 'i' && index > 0) return 'i';
          return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
        }).join(' ');
      };

      // SŁOWNIK DO GRUPOWANIA PUNKTÓW
      const grupyPunktow = {};

      listaOsob.forEach(osoba => {
        // Parsowanie współrzędnych
        let lat = NaN, lon = NaN;
        if (osoba.Wspolrzedne) {
          const czesci = osoba.Wspolrzedne.split(',');
          if (czesci.length === 2) {
            lat = parseFloat(czesci[0].trim());
            lon = parseFloat(czesci[1].trim());
          }
        }

        if (isNaN(lat) || isNaN(lon)) return;

        // Logika filtra producenta
        const producentOsoby = osoba.Producent || "Nieokreślony";
        if (!wybraniProducenci.has(producentOsoby)) return;

        // Logika koloru i progów dni
        let dni = parseInt(osoba.dni_od_ostatniej_wiztyty) || 0;
        let kolor;
        let widoczny = true;

        if (dni <= prog1) {
          kolor = kolory.c1;
          if (!widocznosc.showC1) widoczny = false;
        } else if (dni <= prog2) {
          kolor = kolory.c2;
          if (!widocznosc.showC2) widoczny = false;
        } else {
          kolor = kolory.c3;
          if (!widocznosc.showC3) widoczny = false;
        }

        if (!widoczny) return;

        // TWORZENIE KLUCZA GRUPOWANIA (unikalne współrzędne)
        const klucz = `${lat}_${lon}`;
        if (!grupyPunktow[klucz]) {
          grupyPunktow[klucz] = { lat, lon, kolor, opisy: [] };
        }

        // Budowanie fragmentu opisu dla pojedynczego rekordu
        const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
        const imie = capitalize(osoba.Imię || "");
        const nazwisko = capitalize(osoba.Nazwisko || "");
        const telefon = osoba.Telefon_x0020_komórkowy || "";

        const fragmentOpisu = `
            <div style="margin-bottom: 10px;">
                <strong style="font-size: 14px;">${imie} ${nazwisko}</strong><br>
                <span style="font-size: 11px; color: #666;">${osoba.Ulica || ""} ${osoba.Miejscowość || ""}</span><br>
                <div style="font-size: 12px; margin-top: 4px;">
                    <b>Producent:</b> ${osoba.Producent || "-"}<br>
                    <b>Wizyta:</b> ${fData(osoba.Data_x0020_ost_x0020_wizy)} (${dni} dni)<br>
                    <b>Data montażu:</b> ${fData(osoba.Data_x0020_montaźu)} (${dni} dni)<br>
                    <b>Data ost płatności:</b> ${fData(osoba.Data_x0020_os_x0020_płatnści)} (${dni} dni)<br>

                </div>
                <div style="margin-top: 8px; display: flex; gap: 4px;">
                    <a href="tel:${telefon}" style="flex: 1; text-align: center; background: #28a745; color: white; padding: 6px 2px; text-decoration: none; border-radius: 4px; font-size: 10px; font-weight: bold;">ZADZWOŃ</a>
                    <a href="${googleMapsUrl}" target="_blank" style="flex: 1; text-align: center; background: #4285F4; color: white; padding: 6px 2px; text-decoration: none; border-radius: 4px; font-size: 10px; font-weight: bold;">NAWIGUJ</a>
                </div>
            </div>
        `;

        grupyPunktow[klucz].opisy.push(fragmentOpisu);
        // Jeśli w jednym miejscu są różne kolory, przyjmij kolor "najpilniejszy" (opcjonalne)
        // TWORZENIE LUB AKTUALIZACJA GRUPY
        if (!grupyPunktow[klucz]) {
          grupyPunktow[klucz] = { lat, lon, kolor, opisy: [] };
        } else {
          // Sprawdzamy, czy nowy kolor jest "ważniejszy" niż ten, który już tam jest
          const obecnaWaga = wagaKoloru[grupyPunktow[klucz].color] || 0;
          const nowaWaga = wagaKoloru[kolor] || 0;

          if (nowaWaga > obecnaWaga) {
            grupyPunktow[klucz].kolor = kolor;
          }
        }
      });

      // RYSOWANIE ZEBRANYCH PUNKTÓW
      Object.values(grupyPunktow).forEach(grupa => {
        // Logika wyświetlania nagłówka: tylko jeśli więcej niż 1 urządzenie
        const naglowekLicznik = grupa.opisy.length > 1
          ? `<div style="background: #eee; padding: 3px; font-size: 10px; text-align: center; margin-bottom: 10px; border-radius: 3px;">
                 Liczba urządzeń w tej lokalizacji: ${grupa.opisy.length}
               </div>`
          : "";

        const pelnyOpis = `
            <div style="font-family: sans-serif; max-height: 300px; overflow-y: auto; min-width: 200px;">
                ${naglowekLicznik}
                ${grupa.opisy.join('')}
            </div>
        `;

        const m = L.circleMarker([grupa.lat, grupa.lon], {
          radius: 11, color: grupa.grupa_kolor || grupa.kolor, fillColor: grupa.grupa_kolor || grupa.kolor, fillOpacity: 0.7, weight: 2
        }).bindPopup(pelnyOpis);

        layerGroup.addLayer(m);
      });

      if (layerGroup.getLayers().length > 0) {
        map.fitBounds(L.featureGroup(layerGroup.getLayers()).getBounds());
      }
    }

    document.getElementById('input-json').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const json = JSON.parse(event.target.result);
          // Wyciągamy tablicę z głębi struktury JSON
          const dane = json.dataroot.Do_x0020_XML;

          // --- TO JEST KROK D: DODAJEMY TĘ LINIJKĘ ---
          aktualizujListeProducentow(dane);
          // ------------------------------------------

          przetworzIRysuj(dane);
        } catch (err) {
          console.error(err);
          alert("Błąd pliku JSON! Upewnij się, że struktura jest poprawna.");
        }
      };
      reader.readAsText(file);
    };

    function skalarNaDni(val) {
      return Math.round(Math.pow(val, 2) / 3.42);
    }

    // Przycisk Zastosuj
    document.getElementById('apply-settings').onclick = () => {
      if (ostatnieDane.length > 0) {
        przetworzIRysuj(ostatnieDane);
        document.getElementById('settings-panel').classList.remove('open');
      } else {
        alert("Najpierw wczytaj dane!");
      }
    };

    function formatujDni(dni) {
      if (dni < 365) {
        return `${dni} dni`;
      } else {
        const lata = (dni / 365).toFixed(1);
        return `${dni} dni (~${lata} lat)`;
      }
    }

    function aktualizujListeProducentow(listaOsob) {
      const container = document.getElementById('producer-filter-container');
      const producenci = [...new Set(listaOsob.map(osoba => osoba.Producent || "Nieokreślony"))].sort();

      container.innerHTML = ''; // Czyścimy listę
      wybraniProducenci = new Set(producenci); // Domyślnie zaznaczamy wszystkich

      producenci.forEach(prod => {
        const div = document.createElement('div');
        div.style.marginBottom = "3px";
        div.innerHTML = `
            <label style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                <input type="checkbox" class="prod-checker" value="${prod}" checked>
                ${prod}
            </label>
        `;

        // Obsługa kliknięcia
        div.querySelector('input').onclick = (e) => {
          if (e.target.checked) wybraniProducenci.add(prod);
          else wybraniProducenci.delete(prod);
        };

        container.appendChild(div);
      });
    }

    // Obsługa przycisku "Zaznacz wszystko"
    document.getElementById('check-all-prods').onclick = () => {
      const checkboxes = document.querySelectorAll('.prod-checker');
      checkboxes.forEach(cb => {
        cb.checked = true;
        wybraniProducenci.add(cb.value);
      });
    };

    // Obsługa przycisku "Odznacz wszystko"
    document.getElementById('uncheck-all-prods').onclick = () => {
      const checkboxes = document.querySelectorAll('.prod-checker');
      checkboxes.forEach(cb => {
        cb.checked = false;
        wybraniProducenci.delete(cb.value);
      });
    };

  </script>
</body>

</html>
